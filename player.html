<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Antakshari YouTube Player</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .player-wrapper {
      width: 100%;
      max-width: 960px;
      padding: 16px;
      box-sizing: border-box;
    }
    .video-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      background: #000;
      margin-top: 1rem;
    }
    iframe {
      border: 0;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .hidden-audio {
      width: 1px;
      height: 1px;
      position: absolute;
      left: -9999px;
      top: -9999px;
      opacity: 0;
    }
    .hint {
      text-align: center;
      font-size: 1rem;
      line-height: 1.5;
    }
    .hint strong {
      color: #ffd700;
    }
  </style>
</head>
<body>
  <div class="player-wrapper">
    <div class="hint" id="hintText">Loading player...</div>
    <div class="video-container" id="videoContainer" style="display:none;"></div>
    <div id="hiddenAudio"></div>
  </div>

  <script>
    function parseQuery() {
      var query = window.location.search.substring(1);
      var pairs = query.split('&');
      var params = {};
      pairs.forEach(function(pair) {
        var parts = pair.split('=');
        if (parts.length === 2) {
          params[decodeURIComponent(parts[0])] = decodeURIComponent(parts[1]);
        }
      });
      return params;
    }

    function loadUrls(mode, question) {
      var fileName = mode === 'audio' ? 'Audio.txt' : mode === 'video' ? 'Video.txt' : 'UltaPulta.txt';
      return fetch(fileName)
        .then(response => response.text())
        .then(text => {
          var lines = text.trim().split('\n');
          return lines[question - 1];
        });
    }

    var params = parseQuery();
    var mode = (params.mode || 'video').toLowerCase();
    var question = parseInt(params.question) || 1;
    var hint = document.getElementById('hintText');
    var videoContainer = document.getElementById('videoContainer');
    var hiddenAudio = document.getElementById('hiddenAudio');

    loadUrls(mode, question).then(urlLine => {
      if (!urlLine) {
        hint.innerHTML = 'No URL found for question ' + question + ' in mode ' + mode + '.';
        return;
      }

      if (mode === 'audio') {
        hint.innerHTML = '<strong>Audio Round:</strong> Playing YouTube song for 30 seconds. Video is hidden.';
        var audioIframe = document.createElement('iframe');
        audioIframe.src = urlLine;
        audioIframe.allow = 'autoplay; encrypted-media; picture-in-picture; fullscreen';
        audioIframe.className = 'hidden-audio';
        hiddenAudio.appendChild(audioIframe);
        setTimeout(function() {
          hiddenAudio.innerHTML = '';
          hint.innerHTML = '<strong>Audio Round Complete:</strong> 30 seconds played.';
        }, 30000);
      } else if (mode === 'video') {
        hint.innerHTML = '<strong>Video Round:</strong> Playing the video for 30 seconds.';
        videoContainer.style.display = 'block';
        var videoIframe = document.createElement('iframe');
        videoIframe.src = urlLine;
        videoIframe.allow = 'autoplay; encrypted-media; picture-in-picture; fullscreen';
        videoIframe.allowFullscreen = true;
        videoContainer.appendChild(videoIframe);
        setTimeout(function() {
          videoContainer.innerHTML = '';
          hint.innerHTML = '<strong>Video Round Complete:</strong> 30 seconds played.';
        }, 30000);
      } else if (mode === 'ulta') {
        var parts = urlLine.split(',');
        if (parts.length !== 2) {
          hint.innerHTML = 'Invalid URL format for ulta pulta question ' + question + '.';
          return;
        }
        var videoUrl = parts[0].trim();
        var audioUrl = parts[1].trim();
        hint.innerHTML = '<strong>Ulta Pulta Round:</strong> Video is playing while a different song audio plays for 30 seconds.';
        videoContainer.style.display = 'block';
        var videoIframe = document.createElement('iframe');
        videoIframe.src = videoUrl;
        videoIframe.allow = 'autoplay; encrypted-media; picture-in-picture; fullscreen';
        videoIframe.allowFullscreen = true;
        videoContainer.appendChild(videoIframe);

        var audioIframe = document.createElement('iframe');
        audioIframe.src = audioUrl;
        audioIframe.allow = 'autoplay; encrypted-media; picture-in-picture; fullscreen';
        audioIframe.className = 'hidden-audio';
        hiddenAudio.appendChild(audioIframe);
        setTimeout(function() {
          videoContainer.innerHTML = '';
          hiddenAudio.innerHTML = '';
          hint.innerHTML = '<strong>Ulta Pulta Round Complete:</strong> 30 seconds played.';
        }, 30000);
      } else {
        hint.innerHTML = 'Unknown mode: ' + mode + '. Use mode=audio, mode=video, or mode=ulta.';
      }
    }).catch(error => {
      hint.innerHTML = 'Error loading URLs: ' + error.message + '. Make sure the page is served from a web server.';
    });
  </script>
</body>
</html>
